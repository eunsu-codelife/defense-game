<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>면역 시스템 타워 디펜스 (모바일 완벽 지원)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #c5c6c7;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation; /* 모바일 더블탭 줌 방지 */
        }
        
        /* 반응형 캔버스 (모바일 맞춤) */
        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 850 / 600;
            object-fit: contain;
            box-shadow: 0 0 25px rgba(235, 77, 75, 0.2);
            border: 2px solid #2a0810;
            background: radial-gradient(circle, #210107 0%, #080001 100%);
            border-radius: 0.5rem;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #111; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
        
        .hardcore-glow { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0.4); }
            70% { box-shadow: 0 0 15px 10px rgba(235, 77, 75, 0); }
            100% { box-shadow: 0 0 0 0 rgba(235, 77, 75, 0); }
        }

        /* 화면 전환용 클래스 */
        .screen { display: none; width: 100%; max-w: 1250px; }
        .screen.active { display: flex; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 md:p-4 select-none">

    <!-- 전체화면 토글 버튼 -->
    <button id="fullscreenBtn" onclick="toggleFullScreen()" class="fixed top-3 right-3 md:top-5 md:right-5 z-[100] bg-gray-900/80 border border-gray-700 p-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-gray-800 transition shadow-[0_0_10px_rgba(0,0,0,0.5)]" title="전체화면 전환">
        <svg id="fs-icon-expand" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        <svg id="fs-icon-compress" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>
    </button>

    <!-- ==========================================
         [스크린 1] 메인 타이틀 화면
    =========================================== -->
    <div id="screen-main" class="screen active flex-col items-center justify-center text-center gap-8 py-20">
        <div>
            <h1 class="text-4xl md:text-6xl font-black text-red-500 tracking-widest mb-4 drop-shadow-[0_0_15px_rgba(255,0,0,0.5)]">면역계 디펜스</h1>
            <p class="text-gray-400 text-sm md:text-base">병원체의 침입으로부터 신체의 항상성을 지켜내세요.</p>
        </div>
        
        <div class="flex flex-col gap-4 w-full max-w-sm">
            <button onclick="changeScreen('screen-diff')" class="w-full py-4 md:py-5 bg-red-800 hover:bg-red-700 text-white font-extrabold rounded-2xl shadow-[0_0_15px_rgba(255,0,0,0.3)] transition duration-200 text-lg md:text-xl border border-red-500">
                🚀 작전 시작 (게임 플레이)
            </button>
            <button onclick="openResearchLab()" class="w-full py-4 md:py-5 bg-blue-900/80 hover:bg-blue-800 text-blue-200 hover:text-white font-extrabold rounded-2xl shadow-lg transition duration-200 text-lg md:text-xl border border-blue-600">
                🧬 면역 연구소 (해금/강화)
            </button>
        </div>
        
        <div class="mt-8 flex flex-col items-center gap-1 bg-gray-900/50 p-4 rounded-xl border border-gray-800">
            <span class="text-xs text-gray-500">보유중인 면역력 (IMM)</span>
            <span id="main-imm-display" class="text-2xl font-black text-blue-400">0</span>
        </div>
    </div>

    <!-- ==========================================
         [스크린 2] 난이도 선택 화면
    =========================================== -->
    <div id="screen-diff" class="screen flex-col items-center justify-center py-10">
        <div class="w-full max-w-2xl bg-[#111] border-2 border-red-900/50 p-6 md:p-8 rounded-2xl text-center shadow-xl">
            <h2 class="text-2xl md:text-3xl font-black text-white mb-2 tracking-widest">시뮬레이션 환경 설정</h2>
            <p class="text-xs md:text-sm text-gray-400 mb-8">감염의 진행 속도와 신체의 초기 저항력을 선택하세요.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button onclick="startGameWithDifficulty('easy')" class="w-full py-4 bg-emerald-950/40 hover:bg-emerald-800/80 border border-emerald-500/50 text-emerald-400 font-bold rounded-xl transition flex flex-col items-center gap-1">
                    <span class="text-lg">쉬움 (Easy)</span>
                    <span class="text-[10px] text-gray-400">라이프 40 | 초기 350 ATP | 약한 적</span>
                </button>
                <button onclick="startGameWithDifficulty('normal')" class="w-full py-4 bg-blue-950/40 hover:bg-blue-800/80 border border-blue-500/50 text-blue-400 font-bold rounded-xl transition flex flex-col items-center gap-1">
                    <span class="text-lg">보통 (Normal)</span>
                    <span class="text-[10px] text-gray-400">라이프 30 | 초기 280 ATP | 일반 감염</span>
                </button>
                <button onclick="startGameWithDifficulty('hard')" class="w-full py-4 bg-amber-950/40 hover:bg-amber-800/80 border border-amber-500/50 text-amber-400 font-bold rounded-xl transition flex flex-col items-center gap-1">
                    <span class="text-lg">어려움 (Hard)</span>
                    <span class="text-[10px] text-gray-400">라이프 20 | 초기 180 ATP | 강한 적 체력</span>
                </button>
                <button onclick="startGameWithDifficulty('extreme')" class="w-full py-4 bg-red-950/40 hover:bg-red-800/80 border border-red-500/50 text-red-500 font-bold rounded-xl transition flex flex-col items-center gap-1 hardcore-glow">
                    <span class="text-lg">익스트림 (Extreme)</span>
                    <span class="text-[10px] text-gray-400">라이프 10 | 초기 120 ATP | 즉사급 보스</span>
                </button>
            </div>

            <button onclick="changeScreen('screen-main')" class="px-6 py-2 text-sm text-gray-400 hover:text-white border border-gray-700 rounded-lg hover:bg-gray-800 transition">
                ← 메인으로 돌아가기
            </button>
        </div>
    </div>

    <!-- ==========================================
         [스크린 3] 면역 연구소 (해금 및 강화)
    =========================================== -->
    <div id="screen-lab" class="screen flex-col items-center py-6">
        <div class="w-full max-w-4xl bg-[#111] border border-blue-900/50 p-4 md:p-6 rounded-2xl flex flex-col gap-4 shadow-xl">
            
            <div class="flex justify-between items-center border-b border-gray-800 pb-4">
                <h2 class="text-xl md:text-2xl font-black text-[#45f3ff]">🧬 면역 연구소</h2>
                <button onclick="changeScreen('screen-main')" class="px-4 py-2 text-xs md:text-sm text-gray-400 hover:text-white border border-gray-700 rounded-lg hover:bg-gray-800 transition">
                    메인으로 ←
                </button>
            </div>

            <div class="bg-blue-950/30 border border-blue-500/30 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <span class="text-xs text-blue-400 block font-bold mb-1">사용 가능한 면역력 (IMM)</span>
                    <span id="lab-imm-display" class="text-3xl font-black text-blue-300">0</span>
                </div>
                <button onclick="resetSaveData()" class="px-3 py-1.5 bg-red-900/40 text-red-400 text-[10px] rounded border border-red-800 hover:bg-red-800 transition">데이터 초기화</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll pr-2 max-h-[60vh]">
                <div id="shop-container" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <!-- JS 동적 렌더링 영역 -->
                </div>
            </div>

        </div>
    </div>

    <!-- ==========================================
         [스크린 4] 인게임 
    =========================================== -->
    <div id="screen-game" class="screen flex-col lg:flex-row bg-[#111] p-3 md:p-6 rounded-2xl border border-gray-800 gap-4 lg:gap-6">
        
        <!-- 왼쪽: 캔버스 및 지표 -->
        <div class="flex-1 flex flex-col relative w-full">
            
            <div id="boss-hud" class="w-full bg-red-950/80 border border-red-500/50 p-2 md:p-3 rounded-xl mb-2 hidden relative overflow-hidden transition-all duration-300">
                <div class="flex justify-between items-center mb-1.5 px-1">
                    <span class="text-[10px] md:text-xs font-black text-red-400">▲ 고위험군: 거대 악성 종양! 광역 기절 주의</span>
                    <span id="boss-hp-text" class="text-[10px] md:text-xs font-mono font-bold text-white">0 / 0</span>
                </div>
                <div class="w-full bg-black/60 h-3 md:h-4 rounded-full overflow-hidden border border-red-900/50">
                    <div id="boss-bar-gauge" class="h-full bg-gradient-to-r from-red-600 to-amber-500" style="width: 100%;"></div>
                </div>
            </div>

            <div class="flex justify-between w-full mb-2 px-1 items-center">
                <span class="text-[10px] md:text-xs text-green-400 font-bold">진행 상황 모니터링</span>
                <span id="difficulty-badge" class="text-[10px] md:text-xs font-bold px-2 py-1 rounded border">난이도</span>
            </div>
            
            <div class="relative w-full flex justify-center bg-black rounded-lg">
                <canvas id="gameCanvas" width="850" height="600"></canvas>
                
                <!-- 게임 오버 팝업 -->
                <div id="gameOverScreen" class="absolute inset-0 bg-black/90 flex-col items-center justify-center rounded-lg hidden z-50 p-4 text-center">
                    <h2 class="text-3xl md:text-5xl font-extrabold text-red-600 mb-2">시뮬레이션 실패!</h2>
                    <p class="text-gray-400 text-xs md:text-sm mb-2">면역 방어선이 돌파당했습니다.</p>
                    <p id="imm-reward-lose" class="text-blue-300 font-bold text-xs md:text-sm mb-6"></p>
                    <button onclick="endGameToMain()" class="px-6 py-3 bg-red-700 hover:bg-red-600 text-white font-black rounded-lg text-sm md:text-lg">
                        결과 확인 및 복귀
                    </button>
                </div>

                <!-- 클리어 팝업 -->
                <div id="gameWinScreen" class="absolute inset-0 bg-black/90 flex-col items-center justify-center rounded-lg hidden z-50 p-4 text-center">
                    <h2 class="text-3xl md:text-5xl font-extrabold text-emerald-500 mb-2">시뮬레이션 성공!</h2>
                    <p class="text-gray-400 text-xs md:text-sm mb-2">모든 병원체를 무사히 진압했습니다.</p>
                    <p id="imm-reward-win" class="text-blue-300 font-bold text-xs md:text-sm mb-6"></p>
                    <button onclick="endGameToMain()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-black font-black rounded-lg text-sm md:text-lg">
                        결과 확인 및 복귀
                    </button>
                </div>
            </div>
            
            <!-- 상단 4구역 지표 -->
            <div class="grid grid-cols-4 gap-2 md:gap-4 w-full mt-3 md:mt-4">
                <div class="bg-red-950/60 border border-red-600/50 p-2 md:p-3 rounded-lg md:rounded-xl text-center">
                    <div class="text-[9px] md:text-xs text-red-400">체력 (HP)</div>
                    <div id="hp-display" class="text-sm md:text-2xl font-black text-red-500 truncate">0 / 0</div>
                </div>
                <div class="bg-amber-950/60 border border-amber-600/50 p-2 md:p-3 rounded-lg md:rounded-xl text-center">
                    <div class="text-[9px] md:text-xs text-amber-400">에너지(ATP)</div>
                    <div id="atp-display" class="text-sm md:text-2xl font-black text-amber-500 truncate">0</div>
                </div>
                <div class="bg-blue-950/60 border border-blue-600/50 p-2 md:p-3 rounded-lg md:rounded-xl text-center">
                    <div class="text-[9px] md:text-xs text-blue-400">웨이브</div>
                    <div id="wave-display" class="text-sm md:text-2xl font-black text-blue-400 truncate">0/10</div>
                </div>
                <div class="bg-purple-950/60 border border-purple-600/50 p-2 md:p-3 rounded-lg md:rounded-xl text-center flex flex-col justify-center">
                    <div class="text-[9px] md:text-xs text-purple-400">잔여 적</div>
                    <div id="enemy-display" class="text-xs md:text-xl font-bold text-purple-300 truncate">0 마리</div>
                </div>
            </div>
        </div>

        <!-- 오른쪽/하단: 타워 설치 패널 -->
        <div class="w-full lg:w-[360px] flex flex-col h-auto lg:h-[600px]">
            <!-- 모바일용 취소 버튼 (선택 시 활성화) -->
            <button id="cancel-btn" onclick="cancelSelection()" class="hidden w-full mb-3 py-3 bg-red-900/80 border border-red-500 text-white font-bold rounded-lg shadow-lg text-sm animate-pulse">
                🚫 현재 선택된 세포 설치 취소
            </button>

            <div class="flex-1 overflow-y-auto custom-scroll pr-1 md:pr-2 mb-3 max-h-[30vh] lg:max-h-[500px]">
                <!-- 타워 리스트: 모바일에서 2열 배치 -->
                <div id="active-tower-container" class="grid grid-cols-2 lg:grid-cols-1 gap-2">
                    <!-- JS 동적 렌더링 -->
                </div>
            </div>

            <div class="shrink-0 flex flex-col gap-2 pt-2 border-t border-gray-800">
                <button id="waveBtn" onclick="triggerNextWave()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold rounded-xl shadow-lg transition duration-200 text-base md:text-lg">
                    [1/10] 웨이브 침투 시작
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 화면 전환 매니저 ---
        let currentScreen = 'screen-main';
        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            currentScreen = screenId;
            
            if (screenId === 'screen-main') {
                document.getElementById('main-imm-display').textContent = researchData.immPoints;
            }
        }

        function openResearchLab() {
            buildResearchLobby();
            changeScreen('screen-lab');
        }

        function endGameToMain() {
            changeScreen('screen-main');
            gameState = 'CONFIGURING'; 
        }

        // --- 전체화면 제어 ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.warn(`전체화면 전환을 실패했습니다: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const expandIcon = document.getElementById('fs-icon-expand');
            const compressIcon = document.getElementById('fs-icon-compress');
            if (document.fullscreenElement) {
                expandIcon.classList.add('hidden');
                compressIcon.classList.remove('hidden');
            } else {
                expandIcon.classList.remove('hidden');
                compressIcon.classList.add('hidden');
            }
        });

        // --- 데이터 시스템 (Local Storage) ---
        let researchData = {
            immPoints: 0,
            towers: {
                macrophage: { unlocked: true, level: 1 },
                neutrophil: { unlocked: true, level: 1 },
                dendritic: { unlocked: false, level: 1, unlockCost: 15 },
                bcell: { unlocked: false, level: 1, unlockCost: 30 },
                plasma: { unlocked: false, level: 1, unlockCost: 45 },
                eosinophil: { unlocked: false, level: 1, unlockCost: 75 },
                tcell: { unlocked: false, level: 1, unlockCost: 120 },
                nkcell: { unlocked: false, level: 1, unlockCost: 200 }
            }
        };

        function loadPlayerData() {
            const saved = localStorage.getItem('immune_defense_mobile_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && typeof parsed.immPoints === 'number') {
                        researchData.immPoints = parsed.immPoints;
                        for (let key in parsed.towers) {
                            if (researchData.towers[key]) {
                                researchData.towers[key].unlocked = parsed.towers[key].unlocked;
                                researchData.towers[key].level = parsed.towers[key].level || 1;
                            }
                        }
                    }
                } catch (e) { console.error("Data Load Error", e); }
            }
            document.getElementById('main-imm-display').textContent = researchData.immPoints;
        }

        function savePlayerData() {
            localStorage.setItem('immune_defense_mobile_v2', JSON.stringify(researchData));
        }

        function resetSaveData() {
            if (confirm("모든 업그레이드 내역과 누적 면역력이 영구 초기화됩니다. 계속할까요?")) {
                localStorage.removeItem('immune_defense_mobile_v2');
                researchData = {
                    immPoints: 0,
                    towers: {
                        macrophage: { unlocked: true, level: 1 },
                        neutrophil: { unlocked: true, level: 1 },
                        dendritic: { unlocked: false, level: 1, unlockCost: 15 },
                        bcell: { unlocked: false, level: 1, unlockCost: 30 },
                        plasma: { unlocked: false, level: 1, unlockCost: 45 },
                        eosinophil: { unlocked: false, level: 1, unlockCost: 75 },
                        tcell: { unlocked: false, level: 1, unlockCost: 120 },
                        nkcell: { unlocked: false, level: 1, unlockCost: 200 }
                    }
                };
                savePlayerData();
                buildResearchLobby();
                document.getElementById('main-imm-display').textContent = researchData.immPoints;
            }
        }

        // --- 글로벌 인게임 변수 ---
        let gameState = 'CONFIGURING'; 
        let hp = 30, maxHp = 30, atp = 280;   
        let currentWave = 0; const maxWaves = 10;
        let selectedDifficulty = 'normal';

        let towers = [], enemies = [], projectiles = [], particles = [], barriers = [], spawnQueue = [], shockwaves = [];
        let lastTime = performance.now();
        let spawnTimer = 0, spawnDelay = 650; 
        
        let selectedTowerType = null;
        let mouseX = -999, mouseY = -999;
        let activeBossObj = null;

        // --- 밸런스 설정 ---
        const DIFFICULTY_SETTINGS = {
            easy: { hp: 40, atp: 350, spawnDelay: 800, hpMultiplier: 0.15, barrierHealth: 5000, enemyDmgScale: 0.7, waveClearRewardScale: 1.3, badgeText: "쉬움", badgeClass: "text-emerald-400 border-emerald-500" },
            normal: { hp: 30, atp: 280, spawnDelay: 650, hpMultiplier: 0.25, barrierHealth: 3500, enemyDmgScale: 1.0, waveClearRewardScale: 1.0, badgeText: "보통", badgeClass: "text-blue-400 border-blue-500" },
            hard: { hp: 20, atp: 180, spawnDelay: 550, hpMultiplier: 0.4, barrierHealth: 2500, enemyDmgScale: 1.4, waveClearRewardScale: 0.8, badgeText: "어려움", badgeClass: "text-amber-400 border-amber-500" },
            extreme: { hp: 10, atp: 120, spawnDelay: 450, hpMultiplier: 0.55, barrierHealth: 1500, enemyDmgScale: 2.0, waveClearRewardScale: 0.6, badgeText: "익스트림", badgeClass: "text-red-500 border-red-500" }
        };

        const path = [ { x: -30, y: 120 }, { x: 250, y: 120 }, { x: 250, y: 480 }, { x: 600, y: 480 }, { x: 600, y: 250 }, { x: 900, y: 250 } ];
        const pathWidth = 65;

        const TOWER_INFO = {
            macrophage: { name: "대식세포", cost: 50, range: 90, damage: 45, cooldown: 1000, color: '#f5f6fa', borderColor: '#dcdde1', radius: 20, type: 'attack', shortMark: "대식", textHex: '#2c3e50', desc: "단거리 강력한 단일 대미지" },
            neutrophil: { name: "호중구", cost: 120, range: 130, damage: 12, cooldown: 200, color: '#26de81', borderColor: '#20bf6b', radius: 17, type: 'attack', shortMark: "호중", textHex: '#2c3e50', desc: "빠른 공격 속도 연사형" },
            dendritic: { name: "수지상세포", cost: 220, range: 140, damage: 0, cooldown: 99999, color: '#f1c40f', borderColor: '#f39c12', radius: 18, type: 'buffer', shortMark: "수지", textHex: '#000', desc: "범위 내 아군 공격속도 증가" },
            bcell: { name: "B 세포", cost: 260, range: 240, damage: 0, cooldown: 400, color: '#2980b9', borderColor: '#3498db', radius: 18, type: 'attack', effect: 'slow', shortMark: "B", textHex: '#fff', desc: "광속 둔화 항체 투사" },
            plasma: { name: "형질세포", cost: 380, range: 150, damage: 0, cooldown: 7500, color: '#00d2d3', borderColor: '#48dbfb', radius: 19, type: 'barrier_spawner', barrierHp: 3500, shortMark: "형질", textHex: '#000', desc: "경로에 항체 장벽 소환" },

        // --- 모바일 터치 및 마우스 혼합 대응 시스템 ---
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        window.cancelSelection = function() {
            selectedTowerType = null;
            mouseX = -999; mouseY = -999;
            resetButtons();
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function attemptPlaceTower(x, y) {
            if (gameState === 'CONFIGURING' || !selectedTowerType) return;
            const info = TOWER_INFO[selectedTowerType];
            if (atp < info.cost) return;

            if (canPlaceTower(x, y, info.radius)) {
                let newTower = {
                    x: x, y: y,
                    type: selectedTowerType,
                    info: info,
                    lastShot: 0, target: null,
                    pulse: Math.random() * 10,
                    buffMulti: 1.0, activeBarrier: null, spawnPoint: null,
                    stunTimer: 0 // 기절 상태 추가
                };

                if (info.type === 'barrier_spawner') {
                    newTower.spawnPoint = getClosestPointOnPath(x, y);
                }

                towers.push(newTower);
                atp -= info.cost;
                selectedTowerType = null;
                mouseX = -999; mouseY = -999;
                resetButtons();
                updateUI();
                document.getElementById('cancel-btn').classList.add('hidden');
            }
        }

        let lastTouchX = -999, lastTouchY = -999;
        canvas.addEventListener('touchstart', (e) => {
            if (!selectedTowerType) return;
            e.preventDefault(); 
            const pos = getPointerPos(e);
            mouseX = pos.x; mouseY = pos.y;
            lastTouchX = pos.x; lastTouchY = pos.y;
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if (!selectedTowerType) return;
            e.preventDefault();
            const pos = getPointerPos(e);
            mouseX = pos.x; mouseY = pos.y;
            lastTouchX = pos.x; lastTouchY = pos.y;
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            if (!selectedTowerType) return;
            e.preventDefault();
            attemptPlaceTower(lastTouchX, lastTouchY);
            mouseX = -999; mouseY = -999;
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getPointerPos(e);
            mouseX = pos.x; mouseY = pos.y;
        });
        canvas.addEventListener('mouseleave', () => { mouseX = -999; mouseY = -999; });
        canvas.addEventListener('click', (e) => {
            if (!selectedTowerType) return;
            const pos = getPointerPos(e);
            attemptPlaceTower(pos.x, pos.y);
        });
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();

        });

        window.selectTower = function(type) {
            if (gameState === 'CONFIGURING' || atp < TOWER_INFO[type].cost) return;
            selectedTowerType = type;
            resetButtons();
            const btn = document.getElementById(`btn-${type}`);
            if (btn) btn.classList.add('border-emerald-500', 'bg-gray-800');

        function resetButtons() {
            document.querySelectorAll('.tower-btn').forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-gray-800');
                if(btn.id === 'btn-plasma') btn.classList.remove('border-cyan-400');
            });
            if(selectedTowerType === 'plasma') document.getElementById('btn-plasma').classList.add('border-cyan-400', 'bg-gray-800');
        }

        function canPlaceTower(x, y, radius) {
            for (let i = 0; i < path.length - 1; i++) {
                if (distToSegment({x, y}, path[i], path[i+1]) < (pathWidth/2 + radius + 2)) return false;
            }
            for (let t of towers) {
                if (Math.hypot(t.x - x, t.y - y) < (t.info.radius + radius + 5)) return false;
            }
            if (x < radius || x > canvas.width - radius || y < radius || y > canvas.height - radius) return false;
            return true;
        }

        function distToSegment(p, v, w) {
            let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
            if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = Math.max(0, Math.min(1, ((p.x - v.x)*(w.x - v.x) + (p.y - v.y)*(w.y - v.y)) / l2));
            return Math.hypot(p.x - (v.x + t*(w.x - v.x)), p.y - (v.y + t*(w.y - v.y)));
        }

        function getClosestPointOnPath(px, py) {
            let minDist = Infinity, closest = {x: px, y: py};
            for (let i = 0; i < path.length - 1; i++) {
                let v = path[i], w = path[i+1];
                let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
                let t = l2 === 0 ? 0 : Math.max(0, Math.min(1, ((px - v.x)*(w.x - v.x) + (py - v.y)*(w.y - v.y)) / l2));
                let cx = v.x + t*(w.x - v.x), cy = v.y + t*(w.y - v.y);
                let d = Math.hypot(px - cx, py - cy);
                if (d < minDist) { minDist = d; closest = {x: cx, y: cy}; }
            }
            return closest;
        }

        // --- 게임 진행 함수 ---
        window.startGameWithDifficulty = function(diff) {
            towers = []; enemies = []; projectiles = []; particles = []; barriers = []; spawnQueue = []; shockwaves = [];
            currentWave = 0; activeBossObj = null;
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('gameWinScreen').style.display = 'none';
            document.getElementById('boss-hud').style.display = 'none';
            document.getElementById('cancel-btn').classList.add('hidden');
            selectedTowerType = null;
            
            selectedDifficulty = diff;
            const settings = DIFFICULTY_SETTINGS[diff];

            hp = settings.hp; maxHp = settings.hp; atp = settings.atp; spawnDelay = settings.spawnDelay;
            const lvlScale = 1 + (researchData.towers.plasma.level - 1) * 0.15;
            TOWER_INFO.plasma.barrierHp = Math.round(settings.barrierHealth * lvlScale);

            const badge = document.getElementById('difficulty-badge');
            badge.textContent = settings.badgeText;
            badge.className = `text-[10px] md:text-xs font-bold px-2 py-1 rounded border ${settings.badgeClass}`;

        window.triggerNextWave = function() {
            if (gameState !== 'READY') return;
            currentWave++;
            if (currentWave > maxWaves) return;

            spawnQueue = [];
            const diffSetting = DIFFICULTY_SETTINGS[selectedDifficulty];
            let hpMult = 1 + (currentWave - 1) * diffSetting.hpMultiplier; 

            let c = { bac: 0, vir: 0, fun: 0, sup: 0, par: 0, bos: 0 };
            switch(currentWave) {
                case 1: c.bac = 12; break;
                case 2: c.bac = 15; c.vir = 8; break;
                case 3: c.bac = 12; c.vir = 15; c.fun = 3; break;
                case 4: c.vir = 20; c.fun = 8; c.sup = 2; break;
                case 5: c.bac = 20; c.fun = 12; c.sup = 5; break;
                case 6: c.vir = 25; c.sup = 8; c.par = 3; break;
                case 7: c.fun = 18; c.sup = 12; c.par = 4; break;
                case 8: c.vir = 35; c.sup = 15; c.par = 6; break;
                case 9: c.sup = 25; c.par = 10; break;
                case 10: c.sup = 15; c.par = 8; c.bos = 1; hpMult *= 1.15; break;
            }

            for(let i=0; i<c.bac; i++) spawnQueue.push({ t: ENEMY_INFO.bacteria, hp: hpMult });
            for(let i=0; i<c.vir; i++) spawnQueue.push({ t: ENEMY_INFO.virus, hp: hpMult });
            for(let i=0; i<c.fun; i++) spawnQueue.push({ t: ENEMY_INFO.fungi, hp: hpMult });
            for(let i=0; i<c.sup; i++) spawnQueue.push({ t: ENEMY_INFO.superbug, hp: hpMult });
            for(let i=0; i<c.par; i++) spawnQueue.push({ t: ENEMY_INFO.parasite, hp: hpMult });
            
            spawnQueue.sort(() => Math.random() - 0.5);
            if (c.bos > 0) spawnQueue.push({ t: ENEMY_INFO.boss, hp: hpMult });

            gameState = 'SPAWNING';
            spawnTimer = 0;
            updateUI();
        };

        // --- 메인 게임 루프 ---
        function updateGame(now) {
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.1 || gameState === 'CONFIGURING') return; 

            if (gameState === 'SPAWNING') {
                spawnTimer += dt * 1000;
                if (spawnTimer >= spawnDelay) {
                    if (spawnQueue.length > 0) {
                        const q = spawnQueue.shift();
                        enemies.push(new EnemyInstance(q.t, q.hp));
                        spawnTimer = 0;
                    } else {
                        gameState = 'COMBAT';
                    }
                }
            }

            if (activeBossObj) {
                const bossHud = document.getElementById('boss-hud');
                if (activeBossObj.hp > 0) {
                    bossHud.style.display = 'block';
                    document.getElementById('boss-hp-text').textContent = `${Math.round(activeBossObj.hp)} / ${activeBossObj.maxHp}`;
                    document.getElementById('boss-bar-gauge').style.width = `${Math.max(0, activeBossObj.hp / activeBossObj.maxHp) * 100}%`;
                } else {
                    bossHud.style.display = 'none'; activeBossObj = null;
                }
            }

            if (gameState === 'COMBAT' && enemies.length === 0) {
                if (currentWave === maxWaves) {
                    gameState = 'WIN';
                    let gain = selectedDifficulty === 'extreme' ? 200 : selectedDifficulty === 'hard' ? 100 : selectedDifficulty === 'normal' ? 50 : 30;
                    researchData.immPoints += gain; savePlayerData();
                    document.getElementById('imm-reward-win').textContent = `치료 보상: +${gain} IMM (누적: ${researchData.immPoints})`;
                    document.getElementById('gameWinScreen').style.display = 'flex';
                } else {
                    gameState = 'READY';
                    atp += Math.round((100 + (currentWave * 20)) * DIFFICULTY_SETTINGS[selectedDifficulty].waveClearRewardScale); 
                    updateUI();
                }
            }

            // 보스 기절 쇼크웨이브 업데이트
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                shockwaves[i].update(dt);
                if (shockwaves[i].alpha <= 0) shockwaves.splice(i, 1);
            }

            for (let i = barriers.length - 1; i >= 0; i--) {
                if (barriers[i].hp <= 0) {
                    createDeathParticles(barriers[i].x, barriers[i].y, '#00d2d3', 20);
                    barriers.splice(i, 1);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i]; e.update(dt);
                if (e.hp <= 0) {
                    atp += e.reward; createDeathParticles(e.x, e.y, e.color, e.radius);
                    enemies.splice(i, 1); updateUI();
                } else if (e.escaped) {
                    hp -= e.dmgToPlayer; createDeathParticles(e.x, e.y, '#ff3f34', 20);
                    enemies.splice(i, 1); updateUI();
                    
                    if (hp <= 0) {
                        hp = 0; updateUI(); gameState = 'GAMEOVER';
                        let gain = currentWave * 5;
                        researchData.immPoints += gain; savePlayerData();
                        document.getElementById('imm-reward-lose').textContent = `중도 탈락 보상: +${gain} IMM (누적: ${researchData.immPoints})`;
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        return; 
                    }
                }
            }

            towers.forEach(t => t.buffMulti = 1.0);
            towers.forEach(buffer => {
                if (buffer.info.type === 'buffer' && (buffer.stunTimer || 0) <= 0) {
                    const bFactor = 0.6 - (researchData.towers.dendritic.level - 1) * 0.05; 
                    towers.forEach(target => {
                        if (target.info.type !== 'buffer' && Math.hypot(buffer.x - target.x, buffer.y - target.y) <= buffer.info.range) {
                            target.buffMulti = Math.max(0.3, bFactor); 
                        }
                    });
                }
            });

            for (let t of towers) {
                // 기절(Stun) 시 작동 중지
                if (t.stunTimer > 0) {
                    t.stunTimer -= dt;
                    continue; 
                }

                t.pulse += dt * 3;
                if (t.info.type === 'barrier_spawner') {
                    if ((!t.activeBarrier || t.activeBarrier.hp <= 0) && (now - t.lastShot >= t.info.cooldown * t.buffMulti)) {
                        if(Math.hypot(t.x - t.spawnPoint.x, t.y - t.spawnPoint.y) <= t.info.range) {
                            t.activeBarrier = new BarrierInstance(t.spawnPoint.x, t.spawnPoint.y, TOWER_INFO.plasma.barrierHp);
                            barriers.push(t.activeBarrier); t.lastShot = now;
                            createSparkles(t.spawnPoint.x, t.spawnPoint.y, '#00d2d3', 15);
                        }
                    }
                    continue; 
                }
                if (t.info.type === 'buffer') continue; 

                if (!t.target || !enemies.includes(t.target) || Math.hypot(t.x - t.target.x, t.y - t.target.y) > t.info.range) {
                    t.target = null; let bestProgress = -1;
                    for (let e of enemies) {
                        if (Math.hypot(t.x - e.x, t.y - e.y) <= t.info.range && (e.pathIndex + e.segmentProgress) > bestProgress) {
                            bestProgress = e.pathIndex + e.segmentProgress; t.target = e;
                        }
                    }
                }

                if (t.target && now - t.lastShot >= t.info.cooldown * t.buffMulti) {
                    projectiles.push(new ProjectileInstance(t)); t.lastShot = now;
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i]; p.update(dt);
                if (p.isDead) projectiles.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                const pt = particles[i]; pt.update(dt);
                if (pt.alpha <= 0) particles.splice(i, 1);
            }
        }

        // --- 객체 ---
        class Shockwave {
            constructor(x, y, color, maxRadius) {
                this.x = x; this.y = y; this.color = color;
                this.radius = 10; this.maxRadius = maxRadius;
                this.alpha = 1.0;
            }
            update(dt) {
                this.radius += 200 * dt;
                this.alpha -= 1.0 * dt;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        class BarrierInstance {
            constructor(x, y, maxHp) { this.x = x; this.y = y; this.maxHp = maxHp; this.hp = maxHp; this.radius = 26; this.dmgFlash = 0; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.dmgFlash > 0) this.dmgFlash -= 0.05;
                ctx.fillStyle = this.dmgFlash > 0 ? `rgba(255,100,100,0.8)` : `rgba(0,210,211,${0.4+(this.hp/this.maxHp)*0.4})`;
                ctx.shadowBlur = this.dmgFlash > 0 ? 25 : 15; ctx.shadowColor = this.dmgFlash > 0 ? '#ff4757' : '#00d2d3';
                ctx.beginPath();
                for(let i=0; i<6; i++) { const a = (Math.PI / 3)*i; i===0 ? ctx.moveTo(Math.cos(a)*this.radius, Math.sin(a)*this.radius) : ctx.lineTo(Math.cos(a)*this.radius, Math.sin(a)*this.radius); }
                ctx.closePath(); ctx.fill(); ctx.strokeStyle = this.dmgFlash > 0 ? '#ff6b81' : '#48dbfb'; ctx.lineWidth = 2; ctx.stroke();
                ctx.restore();
                ctx.fillStyle = '#111'; ctx.fillRect(this.x - 20, this.y - this.radius - 8, 40, 4);
                ctx.fillStyle = '#00d2d3'; ctx.fillRect(this.x - 20, this.y - this.radius - 8, 40 * Math.max(0, this.hp/this.maxHp), 4);
            }
        }

        class EnemyInstance {
            constructor(t, hpMult) {
                this.maxHp = Math.round(t.hp * hpMult); this.hp = this.maxHp; this.baseSpeed = t.speed; this.speed = this.baseSpeed;
                this.radius = t.radius; this.color = t.color; this.reward = t.reward; this.type = t.type;
                this.dmgToPlayer = t.dmgToPlayer; this.dps = t.dps; 
                this.pathIndex = 0; this.x = path[0].x; this.y = path[0].y;
                this.segmentProgress = 0; this.escaped = false; this.slowTimer = 0; this.jiggle = 0; 
                
                if (t.type === 'boss') {
                    activeBossObj = this;
                    this.attackTimer = 4.0; // 보스 첫 스턴 공격 타이머
                }
            }
            update(dt) {
                // 보스 기절 스킬 발동 로직
                if (this.type === 'boss') {
                    this.attackTimer -= dt;
                    if (this.attackTimer <= 0) {
                        this.attackTimer = 7.0; // 스킬 재사용 대기시간
                        let range = 130; // 범위 180 -> 130으로 축소
                        shockwaves.push(new Shockwave(this.x, this.y, '#9b59b6', range));
                        towers.forEach(t => {
                            if (Math.hypot(t.x - this.x, t.y - this.y) <= range) {
                                t.stunTimer = 2.5; // 2.5초간 타워 기절
                                createSparkles(t.x, t.y, '#9b59b6', 8);
                            }
                        });
                    }
                }

                let blockedBy = barriers.find(b => Math.hypot(b.x - this.x, b.y - this.y) < b.radius + this.radius - 2);
                if (blockedBy) {
                    blockedBy.hp -= (this.dps * DIFFICULTY_SETTINGS[selectedDifficulty].enemyDmgScale) * dt;
                    blockedBy.dmgFlash = 1.0; this.jiggle += dt * 30;
                    if (Math.random() < (this.dps / 5000)) createSparkles(blockedBy.x + (Math.random()-0.5)*20, blockedBy.y + (Math.random()-0.5)*20, '#00d2d3', 1);
                    return; 
                }
                this.jiggle = 0;
                this.speed = this.slowTimer > 0 ? this.baseSpeed * (this.type === 'boss' ? 0.6 : 0.15) : this.baseSpeed;
                if (this.slowTimer > 0) this.slowTimer -= dt;

                const curr = path[this.pathIndex], next = path[this.pathIndex + 1];
                if (!next) { this.escaped = true; return; }
                const step = (this.speed * 60 * dt) / Math.hypot(next.x - curr.x, next.y - curr.y);
                this.segmentProgress += step;

                if (this.segmentProgress >= 1) {
                    this.segmentProgress = 0; this.pathIndex++;
                    if (this.pathIndex >= path.length - 1) this.escaped = true;
                } else {
                    this.x = curr.x + (next.x - curr.x) * this.segmentProgress;
                    this.y = curr.y + (next.y - curr.y) * this.segmentProgress;
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x + (this.jiggle > 0 ? Math.sin(this.jiggle)*4 : 0), this.y);
                const a = path[this.pathIndex+1] ? Math.atan2(path[this.pathIndex+1].y - path[this.pathIndex].y, path[this.pathIndex+1].x - path[this.pathIndex].x) : 0;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fillStyle = this.color; ctx.beginPath();
                
                if (this.type === 'virus') {
                    for (let i=0; i<6; i++) { const a2 = (Math.PI*2/6)*i; ctx.moveTo(0,0); ctx.lineTo(Math.cos(a2)*this.radius*1.4, Math.sin(a2)*this.radius*1.4); }
                    ctx.strokeStyle = this.color; ctx.lineWidth = 3; ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,this.radius,0,Math.PI*2); ctx.fill();
                } else if (this.type === 'fungi') {
                    for(let i=0; i<8; i++){ const a2 = (Math.PI*2/8)*i, rOff = (i%2===0) ? this.radius : this.radius*0.7; i===0 ? ctx.moveTo(Math.cos(a2)*rOff, Math.sin(a2)*rOff) : ctx.lineTo(Math.cos(a2)*rOff, Math.sin(a2)*rOff); }
                    ctx.closePath(); ctx.fill();
                } else if (this.type === 'parasite') {
                    ctx.rotate(a); ctx.ellipse(0,0,this.radius*1.8,this.radius*0.6,0,0,Math.PI*2); ctx.fill(); ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(-this.radius,-this.radius*0.6); ctx.lineTo(-this.radius,this.radius*0.6); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,-this.radius*0.6); ctx.lineTo(0,this.radius*0.6); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(this.radius,-this.radius*0.6); ctx.lineTo(this.radius,this.radius*0.6); ctx.stroke();
                } else if (this.type === 'superbug') {
                    ctx.ellipse(0,0,this.radius*1.4,this.radius,Math.PI/4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2; ctx.stroke();
                } else if (this.type === 'boss') {
                    ctx.arc(0,0,this.radius + Math.sin(performance.now()/200)*3,0,Math.PI*2); ctx.fill(); ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-25,-20); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(20,-30); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(30,20); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20,25); ctx.stroke();
                } else { ctx.arc(0,0,this.radius,0,Math.PI*2); ctx.fill(); }

                if (this.slowTimer > 0) { ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2.5; ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(0,0,this.radius+4,0,Math.PI*2); ctx.stroke(); }
                ctx.restore();

                const bw = this.type === 'boss' ? 90 : 26, yOff = this.radius + (this.type === 'boss' ? 15 : 8), hpr = Math.max(0, this.hp/this.maxHp);
                ctx.fillStyle = '#111'; ctx.fillRect(this.x - bw/2, this.y - yOff, bw, 4);
                ctx.fillStyle = hpr > 0.5 ? '#2ecc71' : hpr > 0.2 ? '#f1c40f' : '#e74c3c'; ctx.fillRect(this.x - bw/2, this.y - yOff, bw*hpr, 4);
            }
        }

        class ProjectileInstance {
            constructor(tower) {
                this.x = tower.x; this.y = tower.y; this.target = tower.target;
                this.damage = Math.round(tower.info.damage * (1 + (researchData.towers[tower.type].level - 1) * 0.15));
                this.type = tower.info.name.includes("B 세포") ? 'antibody' : tower.info.name.includes("T 세포") ? 'perforin' : tower.info.name.includes("NK") ? 'nkstrike' : tower.info.name.includes("호산구") ? 'granule' : 'normal';
                this.speed = this.type === 'nkstrike' ? 800 : 450; this.color = tower.info.borderColor; this.isDead = false;
            }
            update(dt) {
                if (!this.target || !enemies.includes(this.target)) { this.isDead = true; return; }
                const dist = Math.hypot(this.target.x - this.x, this.target.y - this.y), step = this.speed * dt;
                if (dist <= step) {
                    this.target.hp -= this.damage; if (this.type === 'antibody') this.target.slowTimer = 4.0;
                    let pColor = this.color, pCount = 5;
                    if(this.type === 'perforin') { pColor = '#ff7675'; pCount = 15; } else if(this.type === 'nkstrike') { pColor = '#9b59b6'; pCount = 8; } else if(this.type === 'granule') { pColor = '#fd79a8'; pCount = 10; }
                    createSparkles(this.target.x, this.target.y, pColor, pCount); this.isDead = true;
                } else { this.x += (this.target.x - this.x)/dist * step; this.y += (this.target.y - this.y)/dist * step; }
            }
            draw() {
                ctx.save(); ctx.fillStyle = this.color; ctx.beginPath();
                if (this.type === 'antibody') {
                    ctx.translate(this.x, this.y); ctx.rotate(Math.atan2(this.target.y - this.y, this.target.x - this.x) + Math.PI/2);
                    ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2.5; ctx.moveTo(0,6); ctx.lineTo(0,0); ctx.lineTo(-5,-5); ctx.moveTo(0,0); ctx.lineTo(5,-5); ctx.stroke();
                } else if (this.type === 'nkstrike') {
                    ctx.translate(this.x, this.y); ctx.rotate(Math.atan2(this.target.y - this.y, this.target.x - this.x)); ctx.fillRect(0,-2,18,4); 
                } else if (this.type === 'perforin') {
                    ctx.strokeStyle = '#eb4d4b'; ctx.lineWidth = 3; ctx.moveTo(this.x-5, this.y-5); ctx.lineTo(this.x+5, this.y+5); ctx.stroke();
                } else if (this.type === 'granule') {
                    ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x-2, this.y-2, 2, 0, Math.PI*2); ctx.fill();
                } else { ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
            }
        }

        class Particle {
            constructor(x,y,color) {
                this.x = x; this.y = y; this.color = color; const a = Math.random()*Math.PI*2, s = 40+Math.random()*80;
                this.vx = Math.cos(a)*s; this.vy = Math.sin(a)*s; this.alpha = 1.0; this.decay = 1.0+Math.random()*1.5;
            }
            update(dt) { this.x += this.vx*dt; this.y += this.vy*dt; this.alpha -= this.decay*dt; }
            draw() { ctx.globalAlpha = Math.max(0, this.alpha); ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; }
        }
        function createSparkles(x, y, color, count) { for (let i=0; i<count; i++) particles.push(new Particle(x, y, color)); }
        function createDeathParticles(x, y, color, radius) { createSparkles(x, y, color, Math.min(30, radius)); createSparkles(x, y, '#fff', 10); }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(150, 20, 20, 0.3)'; ctx.lineWidth = pathWidth + 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y); ctx.stroke();
            ctx.strokeStyle = 'rgba(200, 30, 30, 0.5)'; ctx.lineWidth = pathWidth; ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 80, 80, 0.15)'; ctx.lineWidth = pathWidth - 20; ctx.stroke();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.9)'; ctx.fillRect(0, 80, 20, 80); ctx.fillRect(canvas.width - 20, 210, 20, 80);

            // 쇼크웨이브 그리기
            shockwaves.forEach(sw => sw.draw());

            barriers.forEach(b => b.draw());
            towers.forEach(t => {
                if (t.info.type === 'buffer') { ctx.beginPath(); ctx.arc(t.x, t.y, t.info.range, 0, Math.PI*2); ctx.fillStyle = 'rgba(241, 196, 15, 0.05)'; ctx.fill(); ctx.strokeStyle = 'rgba(241, 196, 15, 0.3)'; ctx.lineWidth = 1; ctx.stroke(); }
                if (t.buffMulti < 1.0) { ctx.shadowBlur = 10; ctx.shadowColor = '#f1c40f'; }
                ctx.fillStyle = t.info.color; ctx.beginPath(); 
                if (t.info.type === 'buffer') {
                    let r1 = t.info.radius, r2 = t.info.radius*0.6;
                    for(let i=0; i<10; i++){ const a = (Math.PI*2/10)*i + t.pulse/5, r = i%2===0 ? r1 : r2; i===0 ? ctx.moveTo(t.x+Math.cos(a)*r, t.y+Math.sin(a)*r) : ctx.lineTo(t.x+Math.cos(a)*r, t.y+Math.sin(a)*r); }
                    ctx.closePath(); ctx.fill();
                } else { ctx.arc(t.x, t.y, t.info.radius, 0, Math.PI*2); ctx.fill(); }
                ctx.shadowBlur = 0; ctx.strokeStyle = t.info.borderColor; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = t.info.type === 'buffer' || t.info.type === 'barrier_spawner' ? '#000' : '#2c3e50';
                if(t.info.name.includes('NK') || t.info.name.includes('T') || t.info.name.includes('B') || t.info.name.includes('호산구')) ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const tLvl = researchData.towers[t.type].level; ctx.fillText(`${t.info.shortMark}${tLvl>1?tLvl:''}`, t.x, t.y+1);
                
                // 기절 시 시각 효과 (머리 위 번개 마크 및 보라색 오라)
                if (t.stunTimer > 0) {
                    ctx.fillStyle = 'rgba(155, 89, 182, 0.4)';
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.info.radius + 4, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#e056fd'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText('⚡', t.x, t.y - t.info.radius - 4);
                }

                if (t.info.type === 'barrier_spawner') {
                    const cdRatio = Math.min(1, (performance.now() - t.lastShot) / (t.info.cooldown * t.buffMulti));
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.info.radius + 6, -Math.PI/2, -Math.PI/2 + (Math.PI*2 * cdRatio));
                    ctx.strokeStyle = cdRatio >= 1 ? '#00d2d3' : 'rgba(0, 210, 211, 0.3)'; ctx.lineWidth = 2; ctx.stroke();
                }
            });

            enemies.forEach(e => e.draw()); projectiles.forEach(p => p.draw()); particles.forEach(pt => pt.draw());

            if (selectedTowerType && mouseX >= 0) {
                const info = TOWER_INFO[selectedTowerType], valid = canPlaceTower(mouseX, mouseY, info.radius);
                ctx.fillStyle = valid ? 'rgba(255, 255, 255, 0.1)' : 'rgba(235, 77, 75, 0.2)'; ctx.beginPath(); ctx.arc(mouseX, mouseY, info.range, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = valid ? 'rgba(255, 255, 255, 0.3)' : 'rgba(235, 77, 75, 0.5)'; ctx.lineWidth = 1; ctx.stroke();
                if (info.type === 'barrier_spawner' && valid) {
                    const pt = getClosestPointOnPath(mouseX, mouseY);
                    if(Math.hypot(mouseX - pt.x, mouseY - pt.y) <= info.range) {
                        ctx.fillStyle = 'rgba(0, 210, 211, 0.4)'; ctx.beginPath(); ctx.arc(pt.x, pt.y, 26, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#00d2d3'; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(mouseX, mouseY); ctx.lineTo(pt.x, pt.y); ctx.stroke(); ctx.setLineDash([]);
                    }
                }
                ctx.fillStyle = info.color; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(mouseX, mouseY, info.radius, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
            }
        }

        function mainLoop(now) {
            if (currentScreen === 'screen-game' && gameState !== 'GAMEOVER' && gameState !== 'WIN') { updateGame(now); render(); }
            requestAnimationFrame(mainLoop);
        }

        function updateUI() {
            if (gameState === 'CONFIGURING') return;
            document.getElementById('hp-display').textContent = `${hp} / ${maxHp}`;
            document.getElementById('atp-display').textContent = atp;
            document.getElementById('wave-display').textContent = `${currentWave} / ${maxWaves}`;

            // 전체 적 수량 표시 (스폰 큐에 있는 적도 함께 계산하여 표시)
            if (document.getElementById('enemy-display')) {
                document.getElementById('enemy-display').textContent = `${enemies.length + spawnQueue.length} 마리`;
            }

            for (let type in TOWER_INFO) {
                const btn = document.getElementById(`btn-${type}`);
                if (!btn) continue;
                atp < TOWER_INFO[type].cost ? btn.classList.add('opacity-40', 'cursor-not-allowed') : btn.classList.remove('opacity-40', 'cursor-not-allowed');
            }
            const waveBtn = document.getElementById('waveBtn');
            if (gameState === 'SPAWNING' || gameState === 'COMBAT') {
                waveBtn.disabled = true; waveBtn.className = "w-full py-3 md:py-4 bg-red-950 text-red-700 font-extrabold rounded-xl text-base md:text-lg cursor-not-allowed"; waveBtn.textContent = "방어 교전 진행 중";
            } else {
                waveBtn.disabled = false; waveBtn.className = "w-full py-3 md:py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold rounded-xl shadow-lg transition duration-200 text-base md:text-lg hardcore-glow";
                if (currentWave === maxWaves) { waveBtn.textContent = "최종 승리 대기"; waveBtn.disabled = true; waveBtn.classList.remove('hardcore-glow'); } 
                else { waveBtn.textContent = `[${currentWave + 1}/10] 웨이브 침투 시작`; if (currentWave === 9) waveBtn.textContent = "경고: 거대 종양 임박!"; }
            }
        }

        loadPlayerData();
        requestAnimationFrame((now) => { lastTime = now; mainLoop(now); });
    </script>
</body>
